<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Giuseppe's Journey — 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0608;overflow:hidden;font-family:'Crimson Text',serif;color:#fff;touch-action:none;user-select:none;}
  #c{display:block;width:100vw;height:100vh;}
  #hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;}
  #topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);}
  .hud-block{background:rgba(0,0,0,.55);border:1px solid rgba(255,200,80,.4);border-radius:6px;padding:6px 12px;font-family:'Cinzel',serif;font-size:13px;color:#ffd980;line-height:1.6;}
  .hud-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#aaa;display:block;}
  #menu{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,#1a0e00 0%,#0a0608 70%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,200,80,.03) 40px,rgba(255,200,80,.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,200,80,.03) 40px,rgba(255,200,80,.03) 41px);}
  .menu-cross{color:#ffd700;font-size:48px;margin-bottom:8px;text-shadow:0 0 30px #ffd700aa;}
  #menu h1{font-family:'Cinzel',serif;font-size:clamp(22px,5vw,42px);font-weight:900;
    background:linear-gradient(to bottom,#fff7d6,#c8860a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    text-align:center;letter-spacing:4px;line-height:1.1;margin-bottom:4px;}
  #menu h2{font-family:'Crimson Text',serif;font-style:italic;font-size:clamp(14px,3vw,20px);color:#c8a060;letter-spacing:2px;margin-bottom:30px;}
  .mbtn{display:block;width:min(320px,85vw);padding:14px 24px;margin:8px auto;font-family:'Cinzel',serif;font-size:15px;
    letter-spacing:2px;text-transform:uppercase;background:linear-gradient(to bottom,#3a2200,#1a0e00);
    border:2px solid #c8860a;border-radius:4px;color:#ffd980;cursor:pointer;transition:all .2s;text-align:center;}
  .mbtn:hover,.mbtn:active{background:linear-gradient(to bottom,#5a3600,#2a1800);transform:scale(1.03);box-shadow:0 0 20px #c8860a66;}
  .mbtn:disabled{opacity:.4;pointer-events:none;}
  #menuInstr{margin-top:20px;font-size:12px;color:#888;text-align:center;line-height:1.8;}
  .italy-flag{font-size:28px;margin:0 6px;}
  #dialog{position:fixed;bottom:0;left:0;right:0;z-index:40;pointer-events:none;padding:0 8px 8px;}
  #dialogInner{display:none;background:rgba(8,4,0,.93);border:2px solid #c8860a;border-radius:8px;
    padding:16px 20px;max-width:700px;margin:0 auto;font-family:'Crimson Text',serif;
    font-size:clamp(13px,2.5vw,16px);line-height:1.6;color:#f0e0c0;box-shadow:0 0 30px rgba(200,134,10,.3);
    pointer-events:auto;max-height:65vh;overflow-y:auto;}
  #dialogInner h3{font-family:'Cinzel',serif;color:#ffd700;font-size:clamp(13px,2.5vw,17px);margin-bottom:8px;}
  #dialogInner em{color:#aaddff;font-style:italic;}
  #dialogInner strong{color:#ffcc66;}
  .continue-hint{margin-top:10px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:2px;pointer-events:auto;cursor:pointer;}
  .continue-hint:active{color:#ffd700;}
  .t-btn{display:inline-block;background:rgba(200,134,10,0.3);border:1.5px solid #c8860a;border-radius:4px;
    padding:9px 22px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:#ffd980;
    cursor:pointer;text-transform:uppercase;pointer-events:auto;margin-top:12px;}
  .t-btn:active,.t-btn:hover{background:rgba(200,134,10,0.6);color:#ffd700;border-color:#ffd700;}
  #dpad{position:fixed;bottom:24px;left:24px;z-index:30;width:160px;height:160px;pointer-events:auto;}
  #dpad-ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);border:2px solid rgba(255,200,80,.3);}
  .dpad-btn{position:absolute;width:50px;height:50px;display:flex;align-items:center;justify-content:center;
    background:rgba(200,134,10,.25);border:1.5px solid rgba(200,134,10,.5);border-radius:6px;
    font-size:22px;color:#ffd980;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;}
  .dpad-btn:active,.dpad-btn.pressed{background:rgba(200,134,10,.6);}
  #db-up{top:0;left:55px;}#db-down{bottom:0;left:55px;}#db-left{left:0;top:55px;}#db-right{right:0;top:55px;}
  #db-center{left:55px;top:55px;border-radius:50%;font-size:13px;}
  #actionBtn{position:fixed;bottom:40px;right:24px;z-index:30;width:70px;height:70px;border-radius:50%;
    background:rgba(200,134,10,.3);border:2px solid #c8860a;font-family:'Cinzel',serif;font-size:11px;
    letter-spacing:1px;color:#ffd980;display:none;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;}
  #actionBtn:active{background:rgba(200,134,10,.7);}
  #actionBtn.visible{display:flex;}
  #progressWrap{position:fixed;bottom:0;left:0;right:0;height:6px;background:rgba(0,0,0,.5);z-index:20;}
  #progressBar{height:100%;background:linear-gradient(to right,#c8860a,#ffd700);width:0%;transition:width .3s;}
  #stageTitle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;
    font-size:clamp(18px,4vw,36px);font-weight:900;color:#ffd700;text-align:center;pointer-events:none;z-index:35;
    text-shadow:0 0 40px #ffd700,0 2px 4px #000;opacity:0;transition:opacity .5s;}
  #stageTitle.show{opacity:1;}
  #musicBtn{position:fixed;top:12px;right:16px;z-index:60;background:rgba(0,0,0,.6);border:1px solid #c8860a;
    color:#ffd980;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="topbar">
    <div class="hud-block"><span class="hud-label">Stage</span><span id="hStage">—</span></div>
    <div class="hud-block" style="text-align:center"><span class="hud-label">Score</span><span id="hScore">0</span></div>
    <div class="hud-block"><span class="hud-label">Goal</span><span id="hGoal">—</span></div>
  </div>
</div>
<div id="menu">
  <div class="menu-cross">✝</div>
  <h1>GIUSEPPE'S<br>JOURNEY</h1>
  <h2><span class="italy-flag">🇮🇹</span>A Pilgrimage Through Italy<span class="italy-flag">🇮🇹</span></h2>
  <button class="mbtn" id="btnStory" onclick="startStoryMode()">⚔ Story Mode — 9 Stages</button>
  <button class="mbtn" id="btnPadre" onclick="startPadrePioMode()" disabled>🕊 Padre Pio Mode (Locked)</button>
  <button class="mbtn" id="btnTherese" onclick="startThereseMode()">🌹 Therese Neumann Mode</button>
  <div id="menuInstr">Arrow Keys / WASD / D-Pad to move<br>Space / Action Button to interact &amp; pray<br>Tap planes in flight mode to redirect them</div>
</div>
<div id="stageTitle"></div>
<div id="dialog"><div id="dialogInner"></div></div>
<div id="dpad">
  <div id="dpad-ring"></div>
  <div class="dpad-btn" id="db-up">▲</div>
  <div class="dpad-btn" id="db-down">▼</div>
  <div class="dpad-btn" id="db-left">◀</div>
  <div class="dpad-btn" id="db-right">▶</div>
  <div class="dpad-btn" id="db-center" onclick="triggerAction()">✝</div>
</div>
<div id="actionBtn" onclick="triggerAction()">PRAY ✝</div>
<div id="progressWrap"><div id="progressBar"></div></div>
<button id="musicBtn" onclick="toggleMusic()" title="Toggle Music">♪</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  GIUSEPPE'S JOURNEY v2 — 3D + Touch D-Pad Edition
//  Bug-fixed, speed-tuned, progressive difficulty,
//  Web Audio Italian music, rescue SFX, glow effects
// ═══════════════════════════════════════════════════════

// ── THREE.JS SETUP ──────────────────────────────────────
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,1,0.1,500);

function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

// ── WEB AUDIO ENGINE ─────────────────────────────────────
let audioCtx=null;
let musicNodes=[];
let musicPlaying=false;
let musicEnabled=true;

function getAudio(){
  if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
  return audioCtx;
}

// Generates a tarantella-style Italian melody using oscillators
function startItalianMusic(){
  if(!musicEnabled||musicPlaying)return;
  try{
    const ac=getAudio();
    if(ac.state==='suspended')ac.resume();
    musicPlaying=true;

    const master=ac.createGain();
    master.gain.setValueAtTime(0.18,ac.currentTime);
    master.connect(ac.destination);
    musicNodes.push(master);

    // Italian Tarantella melody notes (C major, lively)
    // Notes as frequencies: C4=261.63, D=293.66, E=329.63, F=349.23, G=392, A=440, B=493.88, C5=523.25
    const noteFreqs={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,G3:196,A3:220,C3:130.81};
    // Lively tarantella-style melody pattern
    const melody=[
      'E4','G4','C5','G4','E4','G4',
      'D4','F4','A4','F4','D4','F4',
      'E4','G4','C5','E5','D5','C5',
      'B4','A4','G4','A4','B4','C5',
      'C5','B4','A4','G4','F4','E4',
      'D4','E4','F4','G4','A4','B4',
      'C5','C5','G4','G4','E4','E4',
      'D4','D4','C4','C4','D4','E4'
    ];
    // Bass accompaniment
    const bass=[
      'C3','C3','G3','G3','A3','A3',
      'D4','D4','A3','A3','D4','D4',
      'C3','C3','G3','G3','A3','A3',
      'G3','G3','G3','G3','G3','G3',
      'C3','C3','G3','G3','A3','A3',
      'D4','D4','A3','A3','D4','D4',
      'C3','C3','G3','G3','C3','C3',
      'G3','G3','C3','C3','G3','C3'
    ];

    const beatDur=0.18; // fast tarantella tempo ~167bpm
    let t=ac.currentTime+0.05;
    let loopCount=0;

    function scheduleMelody(){
      for(let i=0;i<melody.length;i++){
        // Melody voice
        const osc=ac.createOscillator();
        const env=ac.createGain();
        osc.type='triangle';
        osc.frequency.setValueAtTime(noteFreqs[melody[i]],t+i*beatDur);
        env.gain.setValueAtTime(0,t+i*beatDur);
        env.gain.linearRampToValueAtTime(0.6,t+i*beatDur+0.02);
        env.gain.linearRampToValueAtTime(0.3,t+i*beatDur+beatDur*0.5);
        env.gain.linearRampToValueAtTime(0,t+i*beatDur+beatDur*0.9);
        osc.connect(env);env.connect(master);
        osc.start(t+i*beatDur);
        osc.stop(t+i*beatDur+beatDur);
        musicNodes.push(osc,env);

        // Bass voice
        const bosc=ac.createOscillator();
        const benv=ac.createGain();
        bosc.type='sine';
        bosc.frequency.setValueAtTime(noteFreqs[bass[i]],t+i*beatDur);
        benv.gain.setValueAtTime(0,t+i*beatDur);
        benv.gain.linearRampToValueAtTime(0.25,t+i*beatDur+0.02);
        benv.gain.linearRampToValueAtTime(0,t+i*beatDur+beatDur*0.8);
        bosc.connect(benv);benv.connect(master);
        bosc.start(t+i*beatDur);
        bosc.stop(t+i*beatDur+beatDur);
        musicNodes.push(bosc,benv);

        // Tambourine-like percussion every beat
        if(i%3===0){
          const buf=ac.createBuffer(1,ac.sampleRate*0.06,ac.sampleRate);
          const d=buf.getChannelData(0);
          for(let s=0;s<d.length;s++)d[s]=(Math.random()*2-1)*Math.exp(-s/(ac.sampleRate*0.02));
          const src=ac.createBufferSource();
          const flt=ac.createBiquadFilter();
          const penv=ac.createGain();
          src.buffer=buf;
          flt.type='bandpass';flt.frequency.value=3000;flt.Q.value=1;
          penv.gain.setValueAtTime(0.15,t+i*beatDur);
          penv.gain.linearRampToValueAtTime(0,t+i*beatDur+0.05);
          src.connect(flt);flt.connect(penv);penv.connect(master);
          src.start(t+i*beatDur);
          musicNodes.push(src,flt,penv);
        }

        // Mandolin-like high notes every 2 beats
        if(i%2===0){
          const mosc=ac.createOscillator();
          const menv=ac.createGain();
          mosc.type='sawtooth';
          mosc.frequency.setValueAtTime(noteFreqs[melody[i]]*2,t+i*beatDur);
          menv.gain.setValueAtTime(0,t+i*beatDur);
          menv.gain.linearRampToValueAtTime(0.08,t+i*beatDur+0.005);
          menv.gain.exponentialRampToValueAtTime(0.001,t+i*beatDur+0.12);
          mosc.connect(menv);menv.connect(master);
          mosc.start(t+i*beatDur);
          mosc.stop(t+i*beatDur+0.13);
          musicNodes.push(mosc,menv);
        }
      }

      // Loop
      t+=melody.length*beatDur;
      loopCount++;
      // Vary the tempo slightly each loop for humanisation
      if(loopCount%4===0){
        // Add a brief accordion chord between phrases
        const chordNotes=['C4','E4','G4'];
        chordNotes.forEach((n,ci)=>{
          const co=ac.createOscillator();
          const ce=ac.createGain();
          co.type='sawtooth';
          co.frequency.setValueAtTime(noteFreqs[n],t-0.5);
          ce.gain.setValueAtTime(0,t-0.5);
          ce.gain.linearRampToValueAtTime(0.07,t-0.48);
          ce.gain.linearRampToValueAtTime(0,t-0.1);
          co.connect(ce);ce.connect(master);
          co.start(t-0.5);co.stop(t);
          musicNodes.push(co,ce);
        });
      }
    }

    function loopScheduler(){
      if(!musicPlaying||!musicEnabled)return;
      scheduleMelody();
      setTimeout(loopScheduler, (melody.length*beatDur-0.3)*1000);
    }
    scheduleMelody();
    setTimeout(loopScheduler,(melody.length*beatDur-0.3)*1000);
  }catch(e){console.warn('Audio failed:',e);}
}

function stopMusic(){
  musicPlaying=false;
  musicNodes.forEach(n=>{try{n.disconnect();}catch(e){}});
  musicNodes=[];
}

function toggleMusic(){
  musicEnabled=!musicEnabled;
  document.getElementById('musicBtn').textContent=musicEnabled?'♪':'🔇';
  if(!musicEnabled)stopMusic();
  else startItalianMusic();
}

// ── RESCUE SOUND ─────────────────────────────────────────
function playRescueSound(){
  try{
    const ac=getAudio();
    if(ac.state==='suspended')ac.resume();
    const master=ac.createGain();
    master.gain.setValueAtTime(0.4,ac.currentTime);
    master.connect(ac.destination);

    // Rising Italian "bravo!" chime: three ascending notes
    const notes=[523.25,659.25,783.99]; // C5, E5, G5
    notes.forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const env=ac.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ac.currentTime+i*0.08);
      env.gain.setValueAtTime(0,ac.currentTime+i*0.08);
      env.gain.linearRampToValueAtTime(0.8,ac.currentTime+i*0.08+0.02);
      env.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.08+0.3);
      osc.connect(env);env.connect(master);
      osc.start(ac.currentTime+i*0.08);
      osc.stop(ac.currentTime+i*0.08+0.35);
    });
    // Shimmer layer
    const shimmer=ac.createOscillator();
    const senv=ac.createGain();
    shimmer.type='triangle';
    shimmer.frequency.setValueAtTime(1046.5,ac.currentTime);
    shimmer.frequency.linearRampToValueAtTime(1318.5,ac.currentTime+0.25);
    senv.gain.setValueAtTime(0.3,ac.currentTime);
    senv.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);
    shimmer.connect(senv);senv.connect(master);
    shimmer.start(ac.currentTime);
    shimmer.stop(ac.currentTime+0.4);
  }catch(e){}
}

function playHealSound(){
  try{
    const ac=getAudio();
    if(ac.state==='suspended')ac.resume();
    const master=ac.createGain();
    master.gain.setValueAtTime(0.35,ac.currentTime);
    master.connect(ac.destination);
    // Heavenly ascending chord
    [392,523.25,659.25,784].forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const env=ac.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ac.currentTime+i*0.05);
      env.gain.setValueAtTime(0,ac.currentTime+i*0.05);
      env.gain.linearRampToValueAtTime(0.6,ac.currentTime+i*0.05+0.03);
      env.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.05+0.6);
      osc.connect(env);env.connect(master);
      osc.start(ac.currentTime+i*0.05);
      osc.stop(ac.currentTime+i*0.05+0.65);
    });
  }catch(e){}
}

// ── INPUT ────────────────────────────────────────────────
const keys={};
const touchInput={up:false,down:false,left:false,right:false,action:false};

document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

function setupDpadBtn(id,prop){
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();touchInput[prop]=true;el.classList.add('pressed');},{passive:false}));
  ['touchend','mouseup','touchcancel'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();touchInput[prop]=false;el.classList.remove('pressed');},{passive:false}));
}
setupDpadBtn('db-up','up');
setupDpadBtn('db-down','down');
setupDpadBtn('db-left','left');
setupDpadBtn('db-right','right');

function isUp(){return keys['arrowup']||keys['w']||touchInput.up;}
function isDown(){return keys['arrowdown']||keys['s']||touchInput.down;}
function isLeft(){return keys['arrowleft']||keys['a']||touchInput.left;}
function isRight(){return keys['arrowright']||keys['d']||touchInput.right;}
function isAction(){return keys[' ']||touchInput.action;}

let actionPressedLast=false;
function actionJustPressed(){
  const p=isAction();
  const just=p&&!actionPressedLast;
  actionPressedLast=p;
  return just;
}
function triggerAction(){touchInput.action=true;setTimeout(()=>{touchInput.action=false;},150);}

// Plane tap on canvas
document.getElementById('c').addEventListener('touchstart',e=>{
  checkPlaneTap(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
document.getElementById('c').addEventListener('click',e=>{checkPlaneTap(e.clientX,e.clientY);});

// ── GAME STATE ───────────────────────────────────────────
const GS={
  mode:'menu',stage:1,score:0,padrePioUnlocked:false,
  subMode:null,
  confessionCount:0,
  planesRedirected:0,peopleHealed:0,
  bioIndex:0,
  rescued:0,collected:0,
  animTime:0
};

// ── DIFFICULTY SCALING ───────────────────────────────────
// Stage 1 = trivially easy. Stage 9 = genuinely challenging.
// Giuseppe speed: base 0.15 (50% faster than original 0.10)
// Survivor flee speed at stage 1: extremely slow (0.006), scales up to 0.028 by stage 9
// Flee detection radius shrinks as stage increases (they notice you less early on)
// Number of survivors increases with stage

function stageConfig(s){
  return {
    playerSpeed:  0.15,                              // Fixed — Giuseppe always 50% faster than original
    survivorSpeed: 0.006 + (s-1)*0.0025,             // Stage1=0.006 → Stage9=0.026 (was 0.05 base — 75% slower)
    fleeRadius:    4 + s*1.5,                        // Stage1=5.5 → Stage9=17.5 (notice radius)
    wanderStrength:0.002 + (s-1)*0.001,              // How randomly survivors move
    catchRadius:   1.8 - (s-1)*0.03,                 // Stage1=1.8 → Stage9=1.56 (slightly harder to tag)
    survivorCount: 15,                               // Always 15 to rescue
    supplyCount:   8 + Math.floor((s-1)*0.5),        // 8..12 supplies in shelter
    boundSize:     28 + s*1.5                        // Arena grows with stage
  };
}

// ── PLAYER ───────────────────────────────────────────────
const player={obj:null,x:0,z:0,speed:0.15};

// ── GEOMETRY HELPERS ─────────────────────────────────────
function box(w,h,d,color=0xffffff,metalness=0,roughness=0.8){
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({color,metalness,roughness});
  return new THREE.Mesh(geo,mat);
}
function sphere(r,color=0xffffff,metalness=0,roughness=0.7){
  const geo=new THREE.SphereGeometry(r,8,8);
  const mat=new THREE.MeshStandardMaterial({color,metalness,roughness});
  return new THREE.Mesh(geo,mat);
}
function cylinder(rt,rb,h,color=0xffffff){
  const geo=new THREE.CylinderGeometry(rt,rb,h,8);
  const mat=new THREE.MeshStandardMaterial({color});

// ── RESCUE GLOW EFFECT ───────────────────────────────────
// Creates a pulsing golden ring + point light around a rescued survivor
function addRescueGlow(position){
  const glowGroup=new THREE.Group();
  glowGroup.position.copy(position);
  glowGroup.position.y=0;

  // Ring on ground
  const ringGeo=new THREE.TorusGeometry(0.9,0.08,8,32);
  const ringMat=new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xffd700,emissiveIntensity:1,metalness:0.5,roughness:0.2});
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.rotation.x=Math.PI/2;
  ring.position.y=0.1;
  glowGroup.add(ring);

  // Light burst
  const light=new THREE.PointLight(0xffd700,3,4);
  light.position.y=1;
  glowGroup.add(light);

  // Rising star particles
  const starGeo=new THREE.SphereGeometry(0.06,4,4);
  const starMat=new THREE.MeshStandardMaterial({color:0xffee88,emissive:0xffee88,emissiveIntensity:1});
  for(let i=0;i<8;i++){
    const star=new THREE.Mesh(starGeo,starMat);
    const angle=(i/8)*Math.PI*2;
    star.position.set(Math.cos(angle)*0.7,0.1,Math.sin(angle)*0.7);
    star.userData.riseSpeed=0.04+Math.random()*0.03;
    star.userData.angle=angle;
    star.userData.startY=0.1;
    glowGroup.add(star);
  }

  scene.add(glowGroup);

  // Animate and auto-remove after 1.5s
  let elapsed=0;
  const interval=setInterval(()=>{
    elapsed+=0.016;
    const life=elapsed/1.5;
    ring.scale.setScalar(1+life*0.5);
    ringMat.emissiveIntensity=1*(1-life);
    light.intensity=3*(1-life);
    glowGroup.children.forEach(c=>{
      if(c.userData.riseSpeed){
        c.position.y+=c.userData.riseSpeed;
        c.material.opacity=1-life;
        c.material.transparent=true;
      }
    });
    if(elapsed>=1.5){clearInterval(interval);scene.remove(glowGroup);}
  },16);
}

// ── SCENE MANAGEMENT ─────────────────────────────────────
let sceneObjects=[];
function clearScene(){
  // Remove all tracked scene objects
  sceneObjects.forEach(o=>{
    scene.remove(o);
    o.traverse(c=>{
      if(c.geometry)c.geometry.dispose();
      if(c.material){
        if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());
        else c.material.dispose();
      }
    });
  });
  sceneObjects=[];
  // Remove lights explicitly
  const lights=scene.children.filter(c=>c.isLight);
  lights.forEach(l=>scene.remove(l));
  // Remove all entity objects from scene
  entities.forEach(e=>{if(e.obj)scene.remove(e.obj);});
  entities=[];
  if(player.obj){scene.remove(player.obj);player.obj=null;}
}
function addToScene(obj){scene.add(obj);sceneObjects.push(obj);return obj;}

function setupLights(){
  scene.children.filter(c=>c.isLight).forEach(l=>scene.remove(l));
  scene.add(new THREE.AmbientLight(0xffeedd,0.7));
  const sun=new THREE.DirectionalLight(0xfff5e0,1.4);
  sun.position.set(20,40,10);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.left=sun.shadow.camera.bottom=-40;
  sun.shadow.camera.right=sun.shadow.camera.top=40;
  sun.shadow.camera.far=200;
  scene.add(sun);
}

  g.position.set(x,0,z);
  scene.add(g);
  const e={obj:g,x,z,healed:false,type:'sick'};
  entities.push(e);
  return e;
}

// ── PARTICLES ────────────────────────────────────────────
let particles=[];
function spawnParticles(x,y,z,color,count=12){
  for(let i=0;i<count;i++){
    const p=sphere(0.1,color);
    p.material.transparent=true;
    p.position.set(x,y,z);
    p.userData={vx:(Math.random()-0.5)*0.15,vy:Math.random()*0.2+0.05,vz:(Math.random()-0.5)*0.15,life:1};
    scene.add(p);particles.push(p);
  }
}
function updateParticles(){
  particles=particles.filter(p=>{
    p.userData.life-=0.025;
    p.position.x+=p.userData.vx;p.position.y+=p.userData.vy;p.position.z+=p.userData.vz;
    p.userData.vy-=0.005;
    p.material.opacity=p.userData.life;
    if(p.userData.life<=0){scene.remove(p);return false;}
    return true;
  });
}

// ── SPAWN FOR STAGE ──────────────────────────────────────
function spawnForStage(){
  entities.forEach(e=>{if(e.obj)scene.remove(e.obj);});
  entities=[];
  const cfg=stageConfig(GS.stage);
  if(GS.subMode==='rescue'||GS.subMode==='transport'){
    for(let i=0;i<15;i++){
      const a=Math.random()*Math.PI*2;
      // Cap spawn radius so survivors always start within the player's hard boundary (25)
      const maxR=Math.min(cfg.boundSize*0.5, 20);
      const r=5+Math.random()*maxR;
      createSurvivor(Math.cos(a)*r,Math.sin(a)*r);
    }
  } else if(GS.subMode==='shelter'){
    // Alternating communion bread (host) and wine (chalice)
    for(let i=0;i<cfg.supplyCount;i++){
      const a=Math.random()*Math.PI*2;
      const r=4+Math.random()*12;
      createCommunionItem(Math.cos(a)*r,Math.sin(a)*r,i); // even=host, odd=chalice
    }
  } else if(GS.subMode==='flight'){
    for(let i=0;i<7;i++)createPlane((Math.random()-0.5)*60,i*8-28);
  } else if(GS.subMode==='healing'){
    for(let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2;
      const r=3+Math.random()*8;
      createSickPerson(Math.cos(a)*r,Math.sin(a)*r);
    }
  }
}

// ── PLAYER PLACEMENT ─────────────────────────────────────
function placePlayer(x,z,isPadre){
  if(player.obj)scene.remove(player.obj);
  player.obj=isPadre?buildPadrePio():buildGiuseppe();
  player.obj.castShadow=true;
  player.x=x;player.z=z;
  player.obj.position.set(x,0,z);
  scene.add(player.obj);
}

// ── CAMERA ───────────────────────────────────────────────
function updateCamera(){
  if(GS.subMode==='flight'){
    camera.position.set(player.x-2,player.obj?player.obj.position.y+3:22,player.z);
    camera.lookAt(player.x+5,player.obj?player.obj.position.y+2:22,player.z);
  } else if(GS.subMode==='bio'){
    camera.position.set(player.x,5,player.z+10);
    camera.lookAt(player.x,2,player.z);
  } else {
    camera.position.set(player.x,8,player.z+12);

  }
}

const raycaster=new THREE.Raycaster();
const mouse2d=new THREE.Vector2();

function checkPlaneTap(cx,cy){
  if(GS.subMode!=='flight')return;
  mouse2d.x=(cx/innerWidth)*2-1;
  mouse2d.y=-(cy/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2d,camera);
  const meshes=[];
  entities.filter(e=>e.type==='plane'&&!e.redirected).forEach(e=>e.obj.traverse(c=>{if(c.isMesh)meshes.push(c);}));
  const hits=raycaster.intersectObjects(meshes);
  if(hits.length){
    const hit=hits[0].object;
    const e=entities.find(en=>en.type==='plane'&&en.obj&&(en.obj===hit||en.obj===hit.parent));
    if(e&&!e.redirected){
      e.redirected=true;
      e.obj.traverse(c=>{if(c.material)c.material.color.set(0x00dd44);});
      GS.planesRedirected++;GS.score+=75;
      spawnParticles(e.obj.position.x,e.obj.position.y,e.obj.position.z,0x00ff88,15);
      updateHUD();
      if(GS.planesRedirected>=7)flightComplete();
    }
  }
}

      const dx=e.obj.position.x-player.x,dz=e.obj.position.z-player.z;
      if(Math.sqrt(dx*dx+dz*dz)<2.5){
        e.healed=true;
        e.obj.traverse(c=>{if(c.material)c.material.color.set(0x44dd88);});
        spawnParticles(e.obj.position.x,1.5,e.obj.position.z,0xffd700,20);

        GS.peopleHealed++;GS.score+=100;
        healCooldown=35;updateHUD();
        if(GS.peopleHealed>=10)healingComplete();

    }
  });
}

// ── UPDATE LOOPS ─────────────────────────────────────────
function updateRescue(){
  const cfg=stageConfig(GS.stage);
  entities.forEach(e=>{
    if(e.type==='survivor'&&!e.rescued){
      const dx=e.obj.position.x-player.x;
      const dz=e.obj.position.z-player.z;
      const dist=Math.sqrt(dx*dx+dz*dz);

      if(dist<cfg.fleeRadius){
        // Flee from player — speed scaled to stage (75% slower base at stage 1)
        e.vx+=(dx/Math.max(dist,0.01))*cfg.survivorSpeed;
        e.vz+=(dz/Math.max(dist,0.01))*cfg.survivorSpeed;
      } else {
        // Wander gently
        e.vx+=(Math.random()-0.5)*cfg.wanderStrength;
        e.vz+=(Math.random()-0.5)*cfg.wanderStrength;
      }
      e.vx*=0.88;e.vz*=0.88;

      // Survivors share the SAME hard bound as the player (25) — cannot escape playable area
      // Bounce velocity when hitting the wall so they don't pile up on edges
      const nx = e.obj.position.x + e.vx;
      const nz = e.obj.position.z + e.vz;
      if(nx > 25 || nx < -25) e.vx *= -0.5;
      if(nz > 25 || nz < -25) e.vz *= -0.5;
      e.obj.position.x=Math.max(-25,Math.min(25,e.obj.position.x+e.vx));
      e.obj.position.z=Math.max(-25,Math.min(25,e.obj.position.z+e.vz));
      e.obj.position.y=Math.abs(Math.sin(GS.animTime*10))*0.1;
      if(Math.abs(e.vx)+Math.abs(e.vz)>0.001)
        e.obj.rotation.y=Math.atan2(e.vx,e.vz);
      e.x=e.obj.position.x;e.z=e.obj.position.z;

      if(dist<cfg.catchRadius){
        e.rescued=true;
        // Rescue glow + sound before removing
        const pos=e.obj.position.clone();
        scene.remove(e.obj);
        addRescueGlow(pos);
        spawnParticles(pos.x,1,pos.z,0xffd700,15);
        playRescueSound();
        GS.rescued++;GS.score+=10*GS.stage;
        updateHUD();
        if(GS.rescued>=15)stageComplete();
      }
    }
  });
}

function updateTransport(){
  const cfg=stageConfig(GS.stage);
  const trainX=12;
  entities.forEach(e=>{
    if(e.type==='survivor'&&!e.rescued){
      const dx=e.obj.position.x-player.x,dz=e.obj.position.z-player.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<5){e.vx-=dx*0.01;e.vz-=dz*0.01;}
      e.vx*=0.88;e.vz*=0.88;
      // Survivors share the SAME hard bound as the player (25) — cannot escape playable area
      const tnx = e.obj.position.x + e.vx;
      const tnz = e.obj.position.z + e.vz;
      if(tnx > 25 || tnx < -25) e.vx *= -0.5;
      if(tnz > 25 || tnz < -25) e.vz *= -0.5;
      e.obj.position.x=Math.max(-25,Math.min(25,e.obj.position.x+e.vx));
      e.obj.position.z=Math.max(-25,Math.min(25,e.obj.position.z+e.vz));
      e.obj.position.y=Math.abs(Math.sin(GS.animTime*10))*0.08;
      e.x=e.obj.position.x;e.z=e.obj.position.z;
      const distTrain=Math.abs(e.obj.position.x-trainX);
      if(distTrain<2&&Math.abs(e.obj.position.z)<3){
        e.rescued=true;
        const pos=e.obj.position.clone();
        scene.remove(e.obj);
        addRescueGlow(pos);
        spawnParticles(pos.x,1,pos.z,0x44aaff,12);
        playRescueSound();
        GS.rescued++;GS.score+=15*GS.stage;
        updateHUD();
        if(GS.rescued>=15)stageComplete();
      }
    }
  });
}

function updateShelter(){
  const cfg=stageConfig(GS.stage);
  entities.forEach(e=>{
    if(e.type==='supply'&&!e.collected){
      e.rotTimer=(e.rotTimer||0)+0.04;
      e.obj.rotation.y=e.rotTimer;
      e.obj.position.y=Math.sin(e.rotTimer)*0.15+0.3;
      const dx=e.obj.position.x-player.x,dz=e.obj.position.z-player.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<1.8){
        e.collected=true;
        const pos=e.obj.position.clone();
        scene.remove(e.obj);
        spawnParticles(pos.x,1,pos.z,0xffdd00,15);
        playRescueSound();
        GS.collected++;GS.score+=20*GS.stage;
        updateHUD();
        if(GS.collected>=cfg.supplyCount)stageComplete();
      }
    }
  });
}

function updateFlight(){
  entities.forEach(e=>{
    if(e.type==='plane'){
      if(!e.redirected){
        e.obj.position.x+=e.speed;
        e.obj.position.z+=Math.sin(GS.animTime+e.obj.position.z*0.1)*0.03;
        if(e.obj.position.x>80)e.obj.position.x=-80;
      } else {
        e.obj.position.x-=e.speed*0.5;
        e.obj.position.y+=0.025;
      }
    }
  });
  if(isUp())player.obj.position.z-=0.3;
  if(isDown())player.obj.position.z+=0.3;
  if(isLeft())player.obj.position.x-=0.3;
  if(isRight())player.obj.position.x+=0.3;
  player.x=player.obj.position.x;player.z=player.obj.position.z;
}

function updateHealing(){
  if(healCooldown>0)healCooldown--;
  if(actionJustPressed())tryHeal();
}

// ── MAIN UPDATE ──────────────────────────────────────────
let lastTime=0;
function update(ts){
  const dt=Math.min((ts-lastTime)/16.67,3);
  lastTime=ts;
  GS.animTime+=0.016*dt;

  if(GS.mode==='menu')return;
  if(GS.subMode==='bio')return;

  // Player movement (all modes except flight)
  if(GS.subMode!=='flight'&&player.obj){
    let dx=0,dz=0;
    if(isLeft())dx-=player.speed*dt;
    if(isRight())dx+=player.speed*dt;
    if(isUp())dz-=player.speed*dt;
    if(isDown())dz+=player.speed*dt;
    if(dx!==0&&dz!==0){dx*=0.707;dz*=0.707;}
    const bound=25;
    player.x=Math.max(-bound,Math.min(bound,player.x+dx));
    player.z=Math.max(-bound,Math.min(bound,player.z+dz));
    player.obj.position.x=player.x;
    player.obj.position.z=player.z;
    if(dx!==0||dz!==0){
      player.obj.rotation.y=Math.atan2(dx,dz);
      player.obj.position.y=Math.abs(Math.sin(GS.animTime*12))*0.07;
    }
  }

  if(GS.subMode==='rescue')updateRescue();
  else if(GS.subMode==='transport')updateTransport();
  else if(GS.subMode==='shelter')updateShelter();
  else if(GS.subMode==='flight')updateFlight();
  else if(GS.subMode==='healing')updateHealing();
  // NOTE: confession updates via setInterval only — no duplicate call here

  if(GS.mode==='therese')updateThereseMode();

  updateParticles();
  updateCamera();

  // Cloud drift
  if(GS.subMode==='flight'){
    sceneObjects.forEach(o=>{
      if(o.userData&&o.userData.cloud){o.position.x+=0.04;if(o.position.x>150)o.position.x=-150;}
    });
  }

  // Padre Pio halo pulse
  if(GS.mode==='padrepio'&&player.obj){
    const halo=player.obj.children.find(c=>c.geometry&&c.geometry.type==='TorusGeometry');
    if(halo&&halo.material)halo.material.emissiveIntensity=0.4+Math.sin(GS.animTime*3)*0.3;
  }

  document.getElementById('hScore').textContent=GS.score;
}

// ── RENDER LOOP ───────────────────────────────────────────
function render(ts){
  requestAnimationFrame(render);
  update(ts);
  renderer.render(scene,camera);
}

// ── THERESE NEUMANN CHARACTER ─────────────────────────
function buildThereseNeumann(){
  const g = new THREE.Group();
  // Black Bavarian dress
  const body = box(0.5, 0.75, 0.3, 0x1a1a1a, 0, 0.95);
  body.position.y = 0.37; g.add(body);
  // White head covering (Bavarian peasant style)
  const head = sphere(0.22, 0xffcba4, 0, 0.8);
  head.position.y = 0.95; g.add(head);
  const veil = box(0.48, 0.08, 0.48, 0xffffff, 0, 0.9);
  veil.position.y = 1.08; g.add(veil);
  const veilBack = box(0.42, 0.35, 0.08, 0xffffff, 0, 0.9);
  veilBack.position.set(0, 0.92, -0.22); g.add(veilBack);
  // Arms
  const la = box(0.14, 0.48, 0.14, 0x1a1a1a);
  la.position.set(-0.34, 0.3, 0); la.rotation.z = 0.25; g.add(la);
  const ra = la.clone();
  ra.position.set(0.34, 0.3, 0); ra.rotation.z = -0.25; g.add(ra);
  // Stigmata glow on hands (subtle red points)
  const stigLight = new THREE.PointLight(0xff2200, 0.6, 1.2);
  stigLight.position.set(0, 0.4, 0.3); g.add(stigLight);
  // Halo (Servant of God — lighter gold, not full saint yet)
  const haloGeo = new THREE.TorusGeometry(0.28, 0.022, 8, 32);
  const haloMat = new THREE.MeshStandardMaterial({
    color: 0xffeebb, emissive: 0xffd700,
    emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.2
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.y = 1.18; halo.rotation.x = Math.PI * 0.12;
  g.add(halo);
  return g;
}

  const cSteeple = box(1.5, 5, 1.5, 0xddd0b8); cSteeple.position.set(-15, 8.5, -15); addToScene(cSteeple);
  const cCross = box(0.2, 2, 0.2, 0xffd700, 0.9, 0.1); cCross.position.set(-15, 12, -15); addToScene(cCross);
  const cCross2 = box(1.2, 0.2, 0.2, 0xffd700, 0.9, 0.1); cCross2.position.set(-15, 12.5, -15); addToScene(cCross2);
  // Rolling hills
  for (let i = 0; i < 12; i++) {
    const hillH = 2 + Math.random() * 4;
    const hill = sphere(4 + Math.random() * 3, 0x4a7830);
    const ang = (i / 12) * Math.PI * 2;
    hill.position.set(Math.cos(ang) * 35, hillH - 3, Math.sin(ang) * 35);
    addToScene(hill);
  }
  // Trees
  for (let i = 0; i < 15; i++) {

    flower.position.set((Math.random()-0.5)*40, 0.15, (Math.random()-0.5)*40);
    addToScene(flower);
  }
}

// ── COLLECTIBLE LIGHTS (MIRACLES / RELICS / CANDLES) ──
function spawnCollectibles(count, color, label, isCommunion) {
  TS.collectCount = 0;
  TS.collectTarget = count;
  entities.forEach(e => { if (e.obj) scene.remove(e.obj); });
  entities = [];
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const r = 3.5 + Math.random() * 5;
    const x = Math.cos(angle) * r, z = Math.sin(angle) * r;
    let objGroup;
    let itemType = 'collectible';
    if (isCommunion) {
      // Alternate: host for even indices, chalice for odd
      if (i % 2 === 0) {
        objGroup = createCommunionHost(x, z);
        itemType = 'host';
      } else {
        objGroup = createCommunionWine(x, z);
        itemType = 'chalice';
      }
    } else {
      // Generic glowing orb
      const g = new THREE.Group();
      const orb = sphere(0.22, color);
      orb.material = new THREE.MeshStandardMaterial({color, emissive: color, emissiveIntensity: 0.8});
      orb.position.y = 0.5; g.add(orb);
      const light = new THREE.PointLight(color, 1.2, 3);
      light.position.y = 0.5; g.add(light);
      g.position.set(x, 0, z);
      scene.add(g);
      objGroup = g;
    }
    entities.push({obj: objGroup, collected: false, type: itemType, rotTimer: 0});
  }
}

    const angle = (i / colors.length) * Math.PI * 2;
    const box3d = box(0.35, 0.35, 0.35, colors[i], 0.3, 0.5);
    box3d.position.set(Math.cos(angle)*4, 0.3, Math.sin(angle)*4);
    const light = new THREE.PointLight(colors[i], i === holyIndex ? 1.8 : 0.3, 2);
    light.position.copy(box3d.position); light.position.y += 0.5;
    scene.add(box3d); scene.add(light);
    sceneObjects.push(light);
    entities.push({obj: box3d, type:'relic', index:i, isHoly: i===holyIndex});
  }
}

let ecstasyActive = false;
let ecstasyTimer = 0;
function triggerEcstasy() {
  if (ecstasyActive) return;
  ecstasyActive = true; ecstasyTimer = 0;
  // Red-tinted point light pulsing from player
  const ecstasyLight = new THREE.PointLight(0xff2200, 3, 5);
  if (player.obj) player.obj.add(ecstasyLight);
  playEcstasySound();
  showDialog(`<h3>✝ The Friday Ecstasy</h3><em>"She became pale as death. Her eyes closed. Then her face transformed — she was no longer in this world. The wounds opened and bled. All present fell to their knees."</em><br><br>— Msgr. Josef Reetz OSB, eyewitness account, 1948<br><br><span class="t-btn" onclick="hideDialog()">✝ Witness ✝</span>`, 0, () => {
    ecstasyActive = false;
    if (player.obj) { const l = player.obj.children.find(c=>c.isLight); if(l)player.obj.remove(l); }
  });
}

function playEcstasySound() {
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
    const master = ac.createGain();
    master.gain.setValueAtTime(0.3, ac.currentTime);
    master.connect(ac.destination);
    // Gentle, reverent chord — rising minor
    [261.63, 311.13, 392, 523.25].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const env = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.12);
      env.gain.setValueAtTime(0, ac.currentTime + i * 0.12);
      env.gain.linearRampToValueAtTime(0.5, ac.currentTime + i * 0.12 + 0.3);
      env.gain.linearRampToValueAtTime(0, ac.currentTime + i * 0.12 + 2.5);
      osc.connect(env); env.connect(master);
      osc.start(ac.currentTime + i * 0.12);
      osc.stop(ac.currentTime + i * 0.12 + 2.6);
    });
  } catch(e) {}
}

function playMiracleSound() {
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
    const master = ac.createGain();
    master.gain.setValueAtTime(0.35, ac.currentTime);
    master.connect(ac.destination);
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const env = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.1);
      env.gain.setValueAtTime(0, ac.currentTime + i * 0.1);
      env.gain.linearRampToValueAtTime(0.7, ac.currentTime + i * 0.1 + 0.03);
      env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.8);
      osc.connect(env); env.connect(master);
      osc.start(ac.currentTime + i * 0.1);
      osc.stop(ac.currentTime + i * 0.1 + 0.85);
    });
  } catch(e) {}
}

// ── INIT THERESE MODE ─────────────────────────────────
function startThereseMode() {
  document.getElementById('menu').style.display = 'none';
  GS.mode = 'therese';
  GS.score = 0;
  TS.eventIndex = 0;
  startItalianMusic();
  showIsaiahCall(() => showThereseEvent(0));
}

function showThereseEvent(index) {
  if (index >= thereseEvents.length) { endThereseMode(); return; }
  const ev = thereseEvents[index];
  TS.eventIndex = index;
  TS.taskComplete = false;
  TS.prayCount = 0;
  TS.collectCount = 0;
  TS.waitTimer = 0;
  TS.waitDone = false;
  TS.navReached = false;
  TS.pilgrimsHelped = 0;

  clearScene();
  entities.forEach(e => { if (e.obj) scene.remove(e.obj); });
  entities = [];

  // Build scene
  if (ev.scene === 'bavarian_farm') buildBavarianFarm();
  else if (ev.scene === 'bedroom') buildBedroomScene();
  else if (ev.scene === 'farm') buildBavarianFarm();
  else if (ev.scene === 'village') buildVillageScene();
  else if (ev.scene === 'hospital') buildHospitalScene();
  else if (ev.scene === 'church') buildChurchInterior();

  placePlayer(0, 0, false);
  // Replace Giuseppe with Therese
  if (player.obj) scene.remove(player.obj);
  player.obj = buildThereseNeumann();
  player.obj.castShadow = true;
  player.x = 0; player.z = 0;
  player.obj.position.set(0, 0, 0);
  scene.add(player.obj);

  // Set up task
  if (ev.interactive === 'collect') {
    const count = ev.year === '1945' ? 7 : (ev.year === '1929' ? 3 : 5);
    spawnCollectibles(count, 0xffd700, ev.title, false);
  } else if (ev.interactive === 'pray' && ev.year === '1926–1962') {
    // Inedia stage — communion bread (hosts) AND wine (chalices), 2 of each
    spawnCollectibles(4, 0xffd700, 'Communion', true); // indices 0,2 = hosts; 1,3 = chalices
  } else if (ev.interactive === 'navigate') {
    spawnShadows();
  } else if (ev.interactive === 'discern') {
    spawnRelics();
  } else if (ev.interactive === 'pray' && ev.year === '1950s') {
    spawnPilgrims(4);
  }

  document.getElementById('hStage').textContent = `${index+1}/${thereseEvents.length}`;
  // Special label for communion stage
  if (ev.interactive === 'pray' && ev.year === '1926–1962') {
    document.getElementById('hGoal').textContent = 'Collect Bread & Wine (0/4)';
  } else {
    document.getElementById('hGoal').textContent = ev.title;
  }
  document.getElementById('progressBar').style.width = ((index / thereseEvents.length) * 100) + '%';

  const actionBtn = document.getElementById('actionBtn');
  // Inedia stage (1926-1962) uses communion collecting — no action button needed
  const isInedia = ev.interactive === 'pray' && ev.year === '1926–1962';
  const needsAction = !isInedia && (ev.interactive === 'pray' || ev.interactive === 'wait' || ev.interactive === 'final');
  if (needsAction) {
    actionBtn.classList.add('visible');
    actionBtn.textContent = ev.interactive === 'wait' ? 'WAIT' : '🙏 PRAY';
  } else {
    actionBtn.classList.remove('visible');
  }

  showStageTitle(`${ev.year}: ${ev.title}`);

  // Isaiah 6:8 header appears on every Therese chapter opening
  const isaiahBanner = `<div style="border-left:3px solid #ffd700;padding:8px 12px;margin-bottom:12px;background:rgba(255,215,0,0.07);pointer-events:none;">
    <span style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#c8a060;display:block;margin-bottom:4px;">Isaiah 6:8</span>
    <em style="color:#ffeebb;font-size:clamp(12px,2.2vw,15px);line-height:1.6;">"Also I heard the voice of the Lord, saying:<br>'Whom shall I send, and who will go for Us?'<br>Then I said, 'Here am I! Send me.'"</em>
  </div>`;

  // Every dialog has a clickable CONTINUE button — no auto-dismiss
  const taskNote = `<div style="margin-top:10px;font-size:11px;color:#aaa;border-top:1px solid rgba(255,200,80,0.2);padding-top:8px;">📋 ${ev.task}</div>`;
  const continueBtn = `<div style="margin-top:12px;pointer-events:auto;text-align:center;">
    <span class="t-btn" onclick="hideDialog()">✝ Begin ✝</span>
  </div>`;

  showDialog(
    `${isaiahBanner}<h3>${ev.year} — ${ev.title}</h3><em style="color:#c8a060;font-size:11px;letter-spacing:1px;">${ev.chapter}</em><br><br>${ev.desc}<br><br><strong style="color:#ffd700;">${ev.quote}</strong>${taskNote}${continueBtn}`,
    0
  );
}

// ── THERESE TASK COMPLETION ───────────────────────────
function checkThereseTask() {
  const ev = thereseEvents[TS.eventIndex];
  if (TS.taskComplete) return;

  if (ev.interactive === 'walk') {
    const dist = Math.sqrt(player.x * player.x + player.z * player.z);
    if (dist > 8) completeThereseTask();
  } else if (ev.interactive === 'wait') {
    TS.waitTimer++;
    if (TS.waitTimer >= TS.waitTarget && !TS.waitDone) {
      TS.waitDone = true;
      completeThereseTask();
    }
  } else if (ev.interactive === 'collect' || (ev.interactive === 'pray' && ev.year === '1926–1962')) {
    entities.forEach(e => {
      if ((e.type === 'collectible' || e.type === 'host' || e.type === 'chalice') && !e.collected) {
        const dx = e.obj.position.x - player.x;
        const dz = e.obj.position.z - player.z;
        if (Math.sqrt(dx*dx + dz*dz) < 1.6) {
          e.collected = true;
          const pos = e.obj.position.clone();
          scene.remove(e.obj);
          const particleColor = e.type === 'chalice' ? 0xff4444 : 0xffd700;
          spawnParticles(pos.x, 1, pos.z, particleColor, 18);
          playMiracleSound();
          TS.collectCount++;
          if (ev.year === '1926–1962') {
            const bread = entities.filter(e2 => e2.type === 'host' && e2.collected).length;
            const wine = entities.filter(e2 => e2.type === 'chalice' && e2.collected).length;
            document.getElementById('hGoal').textContent = `Bread: ${bread} Wine: ${wine} (${TS.collectCount}/4)`;
          } else {
            document.getElementById('hGoal').textContent = `${ev.title}: ${TS.collectCount}/${TS.collectTarget}`;
          }
          if (TS.collectCount >= TS.collectTarget) completeThereseTask();
        }
        // Animate orbiting sparks on host
        if (e.type === 'host') {
          e.rotTimer = (e.rotTimer||0) + 0.04;
          e.obj.children.forEach(c => {
            if (c.userData && c.userData.orbAngle !== undefined) {
              c.userData.orbAngle += 0.06;
              c.position.x = Math.cos(c.userData.orbAngle) * 0.4;
              c.position.z = Math.sin(c.userData.orbAngle) * 0.4;
              c.position.y = 0.7 + Math.sin(c.userData.orbAngle * 2) * 0.08;
            }
          });
        }
      }
    });
  } else if (ev.interactive === 'navigate') {
    entities.forEach(e => {
      if (e.type === 'shadow') {
        e.obj.userData.vx += (Math.random()-0.5)*0.005;
        e.obj.userData.vz += (Math.random()-0.5)*0.005;
        e.obj.userData.vx *= 0.95; e.obj.userData.vz *= 0.95;
        e.obj.position.x += e.obj.userData.vx;
        e.obj.position.z += e.obj.userData.vz;
        // Check if player touched shadow
        const dx = e.obj.position.x - player.x, dz = e.obj.position.z - player.z;
        if (Math.sqrt(dx*dx+dz*dz) < 1.2) {
          // Push player back gently
          player.x -= dx * 0.3; player.z -= dz * 0.3;
          if (player.obj) { player.obj.position.x = player.x; player.obj.position.z = player.z; }
        }
      }
    });
    // Check if reached gold goal
    const goalX = 10, goalZ = 10;
    const distGoal = Math.sqrt((player.x-goalX)**2 + (player.z-goalZ)**2);
    if (distGoal < 2) completeThereseTask();
  } else if (ev.interactive === 'discern') {
    entities.forEach(e => {
      if (e.type === 'relic') {
        const dx = e.obj.position.x - player.x, dz = e.obj.position.z - player.z;
        if (Math.sqrt(dx*dx+dz*dz) < 1.4 && isAction()) {
          if (e.isHoly) {
            spawnParticles(e.obj.position.x, 1, e.obj.position.z, 0xffd700, 20);
            playMiracleSound();
            completeThereseTask();
          } else {
            showDialog('<h3>Not the holy relic...</h3>Use Therese\'s spiritual gift — seek the one that truly glows.<br><br><span class="t-btn" onclick="hideDialog()">Try Again</span>', 0);
          }
        }
      }
    });
  } else if (ev.interactive === 'pray' && ev.year === '1950s') {
    entities.forEach(e => {
      if (e.type === 'pilgrim' && !e.helped) {
        const dx = e.obj.position.x - player.x, dz = e.obj.position.z - player.z;
        if (Math.sqrt(dx*dx+dz*dz) < 2.2 && isAction()) {
          e.helped = true;
          const ind = e.obj.children.find(c=>c.geometry&&c.geometry.type==='SphereGeometry');
          if (ind) ind.material.color.set(0x00ff88);
          spawnParticles(e.obj.position.x, 1.5, e.obj.position.z, 0x00ff88, 12);
          playHealSound();
          TS.pilgrimsHelped++;
          document.getElementById('hGoal').textContent = `Counseled: ${TS.pilgrimsHelped}/4`;
          if (TS.pilgrimsHelped >= 4) completeThereseTask();
        }
      }
    });
  } else if (ev.interactive === 'pray' && (ev.year === '1926' || ev.year === '1926–1962' || ev.year === '1962' || ev.year === '1972–Present')) {
    // handled by triggerThereseAction
  } else if (ev.interactive === 'final') {
    // handled by triggerThereseAction
  }

  // Rotate collectibles and relics
  entities.forEach(e => {
    if (e.type === 'collectible' || e.type === 'relic') {
      e.rotTimer = (e.rotTimer||0) + 0.04;
      e.obj.rotation.y = e.rotTimer;
      e.obj.position.y = Math.sin(e.rotTimer) * 0.12 + 0.4;
    }
    // Chalice bob gently
    if (e.type === 'chalice' && !e.collected) {
      e.rotTimer = (e.rotTimer||0) + 0.025;
      e.obj.position.y = Math.sin(e.rotTimer) * 0.08;
      e.obj.rotation.y = e.rotTimer * 0.5;
    }
    // Host bob
    if (e.type === 'host' && !e.collected) {
      if (!e.bobTimer) e.bobTimer = Math.random() * Math.PI * 2;
      e.bobTimer += 0.03;
      e.obj.position.y = Math.sin(e.bobTimer) * 0.1;
    }
    if (e.type === 'pilgrim') {
      e.obj.rotation.y = Math.atan2(player.x - e.obj.position.x, player.z - e.obj.position.z);
    }
  });
}

function triggerThereseAction() {
  if (GS.mode !== 'therese') { triggerAction(); return; }
  const ev = thereseEvents[TS.eventIndex];
  if (ev.interactive === 'pray' && ev.year === '1926') {
    triggerEcstasy();
    TS.prayCount++;
    if (TS.prayCount >= 1) { setTimeout(() => completeThereseTask(), 5500); }
  } else if (ev.interactive === 'pray' && ev.year === '1926–1962') {
    TS.prayCount++;
    if (TS.prayCount >= 5) {
      spawnParticles(player.x, 1, player.z, 0xff4444, 20);
      triggerEcstasy();
      setTimeout(() => completeThereseTask(), 5500);
    } else {
      showDialog(`<h3>Station ${TS.prayCount}/5</h3><em>"She relived each moment of the Passion with perfect fidelity."</em><br>— Fr. Naber<br><br><span class="t-btn" onclick="hideDialog()">✝ Continue ✝</span>`, 0);
      playEcstasySound();
      spawnParticles(player.x, 1.5, player.z, 0xff4444, 8);
    }
  } else if (ev.interactive === 'pray' && ev.year === '1962') {
    playEcstasySound();
    spawnParticles(player.x, 1.5, player.z, 0xffd700, 25);
    setTimeout(() => completeThereseTask(), 3000);
  } else if (ev.interactive === 'final' || ev.interactive === 'pray' && ev.year === '1972–Present') {
    playMiracleSound();
    spawnParticles(player.x, 2, player.z, 0xffd700, 30);
    setTimeout(() => completeThereseTask(), 3000);
  } else if (ev.interactive === 'discern') {
    // Check nearby relic
    entities.forEach(e => {
      if (e.type === 'relic') {
        const dx = e.obj.position.x - player.x, dz = e.obj.position.z - player.z;
        if (Math.sqrt(dx*dx+dz*dz) < 1.5) {
          if (e.isHoly) {
            spawnParticles(e.obj.position.x, 1, e.obj.position.z, 0xffd700, 20);
            playMiracleSound();
            completeThereseTask();
          } else {
            showDialog('<h3>Not the holy relic...</h3>Seek the one that glows most brightly.<br><br><span class="t-btn" onclick="hideDialog()">Try Again</span>', 0);
          }
        }
      }
    });
  } else {
    triggerAction();
  }
}

    <div style="display:flex;gap:12px;margin-top:14px;justify-content:center;pointer-events:auto;flex-wrap:wrap;">
      ${passageState.pageIndex > 0
        ? `<span class="t-btn" onclick="prevPassagePage()">◀ Prev</span>`
        : ''}
      <span style="color:#888;font-size:11px;align-self:center;white-space:nowrap;">${pageNum} of ${passageState.totalPages}</span>
      ${!isLast
        ? `<span class="t-btn" onclick="nextPassagePage()">Next ▶</span>`
        : `<span class="t-btn" style="border-color:#ffd700;color:#ffd700;" onclick="showThereseEvent(${passageState.nextEventIndex})">▶ Continue Journey</span>`}
    </div>`;

  showDialog(
    `<div style="pointer-events:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h3 style="margin:0;">📖 From the Books</h3>
        <span style="font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;">Page ${pageNum}/${passageState.totalPages}</span>
      </div>
      <div style="font-size:11px;color:#c8a060;margin-bottom:8px;font-style:italic;">${page.source}</div>
      <div style="font-size:clamp(12px,2.2vw,15px);line-height:1.75;color:#f0e0c0;border-left:3px solid #c8860a;padding-left:12px;">${page.text}</div>
      ${navHtml}
    </div>`,
    0
  );

  // Update action button to also advance pages
  const btn = document.getElementById('actionBtn');
  btn.classList.add('visible');
  btn.innerHTML = isLast ? `Next ▶` : `Page ${pageNum+1} ▶`;
  btn.onclick = isLast
    ? () => { showThereseEvent(passageState.nextEventIndex); btn.onclick = () => triggerThereseAction(); }
    : () => nextPassagePage();
}

function nextPassagePage() {
  const eventIdx = passageState.nextEventIndex - 1;
  const passageData = thereseBookPassages[eventIdx];
  if (!passageData) return;
  passageState.pageIndex = Math.min(passageState.pageIndex + 1, passageState.totalPages - 1);
  renderPassagePage(passageData);
}

function prevPassagePage() {
  const eventIdx = passageState.nextEventIndex - 1;
  const passageData = thereseBookPassages[eventIdx];
  if (!passageData) return;
  passageState.pageIndex = Math.max(passageState.pageIndex - 1, 0);
  renderPassagePage(passageData);
}

function completeThereseTask() {
  if (TS.taskComplete) return;
  TS.taskComplete = true;
  GS.score += 150;
  hideDialog();
  const ev = thereseEvents[TS.eventIndex];
  const nextIndex = TS.eventIndex + 1;
  spawnParticles(player.x, 2, player.z, 0xffd700, 25);
  playMiracleSound();

  // Show completion with manual CONTINUE button — no auto-dismiss
  const btn = document.getElementById('actionBtn');
  btn.classList.add('visible');
  btn.innerHTML = '📖 Read';
  btn.onclick = () => {
    showBookPassages(TS.eventIndex, nextIndex);
    btn.onclick = () => triggerThereseAction();
  };

  showDialog(
    `<div style="text-align:center;padding:4px 0;">
      <div style="font-size:28px;margin-bottom:8px;">✝</div>
      <h3 style="font-size:clamp(14px,3vw,20px);margin-bottom:10px;">${ev.title} — Complete</h3>
      <div style="border-left:3px solid #ffd700;padding:8px 12px;text-align:left;margin-bottom:12px;background:rgba(255,215,0,0.06);">
        <em style="color:#ffeebb;">${thereseQuotes[TS.eventIndex % thereseQuotes.length]}</em>
      </div>
      <div style="color:#c8a060;font-size:13px;margin-bottom:14px;">Score: <strong style="color:#ffd700;">${GS.score}</strong></div>
      <div style="pointer-events:auto;text-align:center;">
        <span class="t-btn" style="border-color:#ffd700;color:#ffd700;" onclick="showBookPassages(${TS.eventIndex},${nextIndex})">
          📖 Read the Books ▶
        </span>
      </div>
    </div>`,
    0
  );
}

function endThereseMode() {
  clearScene();
  buildChurchInterior();
  placePlayer(0, 0, false);
  if (player.obj) scene.remove(player.obj);
  player.obj = buildThereseNeumann();
  player.obj.position.set(0, 0, 0);
  scene.add(player.obj);

  hideDialog();
  showDialog(
    `<h3>🌹 Servant of God Therese Neumann 🌹</h3>
    <em>Konnersreuth, Bavaria — April 9, 1898 – September 18, 1962</em>
    <br><br>You have walked the entire earthly pilgrimage of Therese Neumann — the Bavarian stigmatist, mystic, and Servant of God. For 36 years she bore the wounds of Christ. For 36 years she lived on the Holy Eucharist alone. For 36 years she wept tears of blood every Friday in union with the Passion of Jesus.
    <br><br><em>"She who for 36 years bore the wounds of the Lord Jesus in her body has now received her reward."</em>
    <br>— Fr. Josef Naber, funeral homily, 1962
    <br><br><strong>The cause for her beatification is ongoing.</strong> Servant of God Therese Neumann, pray for us.
    <br><br>Final Score: <strong>${GS.score}</strong>
    <br><br><span class="t-btn" onclick="returnToMenu()">▶ Return to Menu</span>`,
    0
  );
  document.getElementById('actionBtn').innerHTML = 'MENU';
  document.getElementById('actionBtn').classList.add('visible');
  document.getElementById('actionBtn').onclick = () => { returnToMenu(); document.getElementById('actionBtn').onclick = () => triggerThereseAction(); };
}

// ── THERESE UPDATE LOOP ───────────────────────────────
function updateThereseMode() {
  if (GS.mode !== 'therese') return;
  checkThereseTask();
  // Halo pulse on Therese
  if (player.obj) {
    const halo = player.obj.children.find(c => c.geometry && c.geometry.type === 'TorusGeometry');
    if (halo && halo.material) halo.material.emissiveIntensity = 0.3 + Math.sin(GS.animTime * 2.5) * 0.25;
    const stigLight = player.obj.children.find(c => c.isLight);
    if (stigLight) stigLight.intensity = 0.4 + Math.sin(GS.animTime * 4) * 0.25;
  }
}

// ── PATCH ACTION BUTTON FOR THERESE MODE ─────────────
document.getElementById('db-center').onclick = () => {
  if (GS.mode === 'therese') triggerThereseAction();
  else triggerAction();
};
document.getElementById('actionBtn').onclick = () => {
  if (GS.mode === 'therese') triggerThereseAction();
  else triggerAction();
};
</script>
</body>
</html>
